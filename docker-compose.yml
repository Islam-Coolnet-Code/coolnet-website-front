services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_CMS_API_URL: ${VITE_CMS_API_URL:-}
        VITE_BASE_URL: ${VITE_BASE_URL:-https://portal.jet.net.il}
    container_name: coolnet-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
