name: Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - run: npm run build
        env:
          VITE_CMS_API_URL: ${{ vars.VITE_CMS_API_URL }}
          VITE_BASE_URL: ${{ vars.VITE_BASE_URL }}

      - run: npm run lint

  deploy:
    name: Deploy to Server
    needs: build
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build for production
        run: npm run build
        env:
          VITE_CMS_API_URL: ${{ vars.VITE_CMS_API_URL }}
          VITE_BASE_URL: ${{ vars.VITE_BASE_URL }}

      - name: Deploy static files
        run: |
          mkdir -p $HOME/coolnet/frontend
          rsync -av --delete dist/ $HOME/coolnet/frontend/
          echo "Frontend deployed to $HOME/coolnet/frontend"
