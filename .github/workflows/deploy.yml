name: Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DEPLOY_PATH: /opt/coolnet/frontend

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - run: npm run build
        env:
          VITE_CMS_API_URL: ${{ vars.VITE_CMS_API_URL }}
          VITE_BASE_URL: ${{ vars.VITE_BASE_URL }}

      - run: npm run lint

  deploy:
    name: Deploy to Server
    needs: build
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Copy project to deploy path
        run: |
          sudo mkdir -p ${{ env.DEPLOY_PATH }}
          sudo rsync -av --exclude='.git' --exclude='node_modules' ./ ${{ env.DEPLOY_PATH }}/

      - name: Deploy with Docker
        working-directory: ${{ env.DEPLOY_PATH }}
        run: |
          # Build with production API URL
          sudo docker compose build --no-cache \
            --build-arg VITE_CMS_API_URL="${{ vars.VITE_CMS_API_URL }}" \
            --build-arg VITE_BASE_URL="${{ vars.VITE_BASE_URL }}"

          # Deploy
          sudo docker compose up -d frontend

          # Cleanup old images
          sudo docker image prune -f

          echo "Frontend deployment complete!"
